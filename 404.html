<!doctype html>
<html lang="zh-CN">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>404 / Gesen</title>
  <meta name="robots" content="noindex">
  <style>
    :root {
      --paper: #eef0e8;
      --ink: #171512;
      --muted: #66635d;
      --red: #cf432a;
    }

    * {
      box-sizing: border-box;
    }

    body {
      display: grid;
      min-height: 100svh;
      margin: 0;
      place-items: center;
      color: var(--ink);
      font-family: "Avenir Next", "PingFang SC", "Hiragino Sans GB", "Microsoft YaHei", sans-serif;
      background:
        linear-gradient(90deg, rgba(23, 21, 18, .08) 1px, transparent 1px),
        linear-gradient(180deg, rgba(23, 21, 18, .08) 1px, transparent 1px),
        var(--paper);
      background-size: 42px 42px;
    }

    main {
      width: min(680px, calc(100% - 2rem));
      padding: 3rem 0;
    }

    p {
      margin: 0;
      color: var(--muted);
      line-height: 1.8;
    }

    strong {
      display: block;
      margin-bottom: 1rem;
      font-family: Georgia, "Songti SC", serif;
      font-size: 5rem;
      font-weight: 400;
      line-height: 1;
    }

    a {
      display: inline-flex;
      margin-top: 1.5rem;
      color: var(--ink);
      font-weight: 700;
      text-decoration-color: var(--red);
      text-underline-offset: .25em;
    }
  </style>
</head>
<body>
  <main>
    <strong>404</strong>
    <p>这个地址没有内容了。可以回到首页，从项目清单里继续找。</p>
    <a href="/">回到首页</a>
  </main>
</body>
</html>
